name: city_blitz_app
description: "CityBlitz – Montgomery Urban Operating System mobile app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Map & Animation & Charts
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  animate_do: ^3.3.4
  fl_chart: ^0.69.0
  
  # Data Models (Freezed)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Riverpod code generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5
  
  # Data model code generation
  freezed: ^3.0.0
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  
  # assets:
  #   - assets/images/
  #   - assets/icons/
